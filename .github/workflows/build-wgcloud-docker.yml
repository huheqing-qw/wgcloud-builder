name: Build WGCLOUD ARM64 (Debug)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Download source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
          ls -la wgcloud-${VERSION}/
      
      - name: Install Maven and JDK 8
        run: |
          sudo apt-get update
          sudo apt-get install -y maven openjdk-8-jdk-headless
          java -version
          mvn -version
      
      - name: Try to compile and capture full log
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          
          echo "=== 开始编译，显示完整错误 ==="
          
          # 尝试编译并保存完整日志
          mvn clean package -DskipTests -e -X 2>&1 | tee compile.log
          
          # 检查编译是否成功
          if [ -d target ] && [ -n "$(ls target/*.jar 2>/dev/null | grep -v original)" ]; then
            echo "✅ 编译成功"
            echo "compiled=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 编译失败"
            echo "compiled=false" >> $GITHUB_OUTPUT
            echo "=== 最后 100 行错误日志 ==="
            tail -100 compile.log
          fi
      
      - name: Upload compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-log
          path: wgcloud-*/wgcloud-server/compile.log
          retention-days: 7
      
      - name: Prepare Docker context
        if: steps.try.outputs.compiled == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p docker-build
          cp wgcloud-${VERSION}/wgcloud-server/target/*.jar docker-build/wgcloud-server.jar
          cp -r wgcloud-${VERSION}/wgcloud-server/src/main/resources docker-build/config 2>/dev/null || true
          mkdir -p docker-build/logs docker-build/data
      
      - name: Create Dockerfile
        if: steps.try.outputs.compiled == 'true'
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          WORKDIR /wgcloud-server
          COPY wgcloud-server.jar /wgcloud-server/
          COPY config /wgcloud-server/config/
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          EXPOSE 9997 9998 9999
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
      
      - name: Build Docker image
        if: steps.try.outputs.compiled == 'true'
        run: |
          cd docker-build
          docker build -t wgcloud-server:latest .
      
      - name: Save and upload
        if: steps.try.outputs.compiled == 'true'
        run: |
          docker save wgcloud-server:latest | gzip > wgcloud-server-arm64.tar.gz
      
      - name: Upload artifact
        if: steps.try.outputs.compiled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-arm64
          path: wgcloud-server-arm64.tar.gz
