name: Build WGCLOUD ARM64 (Multi-stage Docker)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Download source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
      
      - name: Create fix_pom.py script
        run: |
          cat > fix_pom.py << 'PYTHON_EOF'
          import re
          import sys
          
          with open('pom.xml', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # 删除包含 ojdbc 或 sqljdbc 的整个 dependency 块
          pattern = r'<dependency>.*?(?:ojdbc|sqljdbc).*?</dependency>'
          new_content = re.sub(pattern, '', content, flags=re.DOTALL)
          
          with open('pom.xml', 'w', encoding='utf-8') as f:
              f.write(new_content)
          
          print("✅ 依赖已删除")
          PYTHON_EOF
          
          echo "✅ fix_pom.py 已创建"
      
      - name: Create Dockerfile
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          cat > Dockerfile << 'EOF'
          # 第一阶段：编译
          FROM arm64v8/maven:3.8-openjdk-8 AS builder
          
          WORKDIR /build
          
          # 复制源码
          COPY wgcloud-${VERSION}/wgcloud-server /build
          
          # 复制修复脚本
          COPY fix_pom.py /build/
          
          # 运行修复脚本
          RUN python3 fix_pom.py
          
          # 验证 pom.xml 是否完整
          RUN grep -q "<project" pom.xml && echo "✅ pom.xml 有效" || (echo "❌ pom.xml 损坏" && exit 1)
          
          # 编译
          RUN mvn clean package -DskipTests
          
          # 第二阶段：运行
          FROM arm64v8/openjdk:8-jdk-slim
          
          WORKDIR /wgcloud-server
          
          # 从编译阶段复制 jar
          COPY --from=builder /build/target/*.jar /wgcloud-server/wgcloud-server.jar
          
          # 复制配置文件
          COPY wgcloud-${VERSION}/wgcloud-server/src/main/resources /wgcloud-server/config/
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          ENV TZ=Asia/Shanghai
          RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
          
          EXPOSE 9997 9998 9999
          
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
          
          # 替换版本号
          sed -i "s/\${VERSION}/$VERSION/g" Dockerfile
          echo "✅ Dockerfile 已创建"
      
      - name: Build Docker image
        run: |
          docker build -t wgcloud-server:${{ steps.version.outputs.version }} -t wgcloud-server:latest .
          docker images
      
      - name: Test container
        run: |
          docker run -d --name test-wgcloud -p 19999:9999 wgcloud-server:latest
          echo "等待启动..."
          sleep 20
          echo "=== 容器日志 ==="
          docker logs test-wgcloud --tail 30 || true
          docker stop test-wgcloud
          docker rm test-wgcloud || true
      
      - name: Save and upload
        run: |
          docker save wgcloud-server:latest | gzip > wgcloud-server-arm64.tar.gz
          ls -lh wgcloud-server-arm64.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-arm64
          path: wgcloud-server-arm64.tar.gz
          retention-days: 30
