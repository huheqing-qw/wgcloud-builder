name: Build WGCLOUD ARM64 (Ignore Missing Dependencies)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Download source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
      
      - name: Install Maven and JDK 8
        run: |
          sudo apt-get update
          sudo apt-get install -y maven openjdk-8-jdk-headless
          java -version
          mvn -version
      
      - name: Create Maven settings to ignore missing deps
        run: |
          cat > settings.xml << 'EOF'
          <settings>
            <profiles>
              <profile>
                <id>allow-missing</id>
                <properties>
                  <maven.resolver.transport>wagon</maven.resolver.transport>
                </properties>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>allow-missing</activeProfile>
            </activeProfiles>
          </settings>
          EOF
      
      - name: Build with missing dependencies ignored
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          
          # 尝试编译，忽略缺失的依赖
          mvn clean package -DskipTests \
            -Dmaven.wagon.http.ssl.insecure=true \
            -Dmaven.resolver.transport=wagon \
            --settings ../../settings.xml \
            || echo "编译失败，但继续"
      
      - name: Check if jar exists
        id: check_jar
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server/target
          if ls *.jar 2>/dev/null | grep -v original; then
            echo "jar_exists=true" >> $GITHUB_OUTPUT
            echo "✅ jar 文件存在"
          else
            echo "jar_exists=false" >> $GITHUB_OUTPUT
            echo "❌ 没有 jar 文件"
            ls -la
          fi
      
      - name: Prepare Docker context
        if: steps.check_jar.outputs.jar_exists == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p docker-build
          cp wgcloud-${VERSION}/wgcloud-server/target/*.jar docker-build/wgcloud-server.jar
          cp -r wgcloud-${VERSION}/wgcloud-server/src/main/resources docker-build/config 2>/dev/null || true
          mkdir -p docker-build/logs docker-build/data
      
      - name: Create Dockerfile
        if: steps.check_jar.outputs.jar_exists == 'true'
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          
          WORKDIR /wgcloud-server
          
          COPY wgcloud-server.jar /wgcloud-server/
          COPY config /wgcloud-server/config/
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          ENV TZ=Asia/Shanghai
          RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
          
          EXPOSE 9997 9998 9999
          
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
      
      - name: Build Docker image
        if: steps.check_jar.outputs.jar_exists == 'true'
        run: |
          cd docker-build
          docker build -t wgcloud-server:latest .
      
      - name: Save and upload
        if: steps.check_jar.outputs.jar_exists == 'true'
        run: |
          docker save wgcloud-server:latest | gzip > wgcloud-server-arm64.tar.gz
          ls -lh wgcloud-server-arm64.tar.gz
      
      - name: Upload artifact
        if: steps.check_jar.outputs.jar_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-arm64
          path: wgcloud-server-arm64.tar.gz
          retention-days: 30
      
      - name: Upload source code if build failed
        if: steps.check_jar.outputs.jar_exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-source
          path: wgcloud-*/
          retention-days: 7
