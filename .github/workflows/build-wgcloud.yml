name: Build WGCLOUD ARM64 Image (Compiled)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号 (如 3.6.3)'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 构建版本: v${VERSION}"
      
      - name: Download WGCLOUD release source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
      
      - name: Install Maven and JDK
        run: |
          sudo apt-get update
          sudo apt-get install -y maven openjdk-8-jdk-headless
          java -version
          mvn -version
      
      - name: Build WGCLOUD Server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          echo "开始编译 WGCLOUD Server..."
          mvn clean package -DskipTests
          echo "✅ 编译完成"
          ls -la target/
      
      - name: Prepare Docker build context
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p docker-build
          
          # 复制编译后的文件
          cp -r wgcloud-${VERSION}/wgcloud-server/target/wgcloud-server-${VERSION}.jar docker-build/
          cp -r wgcloud-${VERSION}/wgcloud-server/start.sh docker-build/ 2>/dev/null || true
          cp -r wgcloud-${VERSION}/wgcloud-server/bin docker-build/ 2>/dev/null || true
          cp -r wgcloud-${VERSION}/wgcloud-server/config docker-build/ 2>/dev/null || true
          
          # 创建必要目录
          mkdir -p docker-build/logs docker-build/data
          
          echo "✅ 构建上下文已准备"
          ls -la docker-build/
      
      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          
          LABEL maintainer="wgcloud"
          LABEL description="WGCLOUD Monitoring Server for ARM64"
          
          WORKDIR /wgcloud-server
          
          # 复制编译好的 jar 文件
          COPY *.jar /wgcloud-server/wgcloud-server.jar
          
          # 复制配置和脚本（如果存在）
          COPY config /wgcloud-server/config/
          COPY bin /wgcloud-server/bin/ 2>/dev/null || true
          COPY start.sh /wgcloud-server/ 2>/dev/null || true
          
          # 创建目录
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          EXPOSE 9997 9998 9999
          
          # 启动命令
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
          
          echo "✅ Dockerfile 已创建"
      
      - name: Build Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd docker-build
          docker build -t wgcloud-server:${VERSION} -t wgcloud-server:latest .
          docker images
      
      - name: Save and compress image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker save wgcloud-server:${VERSION} | gzip > wgcloud-server-${VERSION}-arm64-compiled.tar.gz
          echo "✅ 构建完成"
          ls -lh *.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-${{ steps.version.outputs.version }}-arm64-compiled
          path: wgcloud-server-*.tar.gz
          retention-days: 30
