name: Build WGCLOUD ARM64 Image (Compiled)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号 (如 3.6.3)'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 构建版本: v${VERSION}"
      
      - name: Download WGCLOUD release source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
      
      - name: Install Maven and JDK 8
        run: |
          sudo apt-get update
          sudo apt-get install -y maven openjdk-8-jdk-headless python3
          echo "=== Java 版本 ==="
          java -version
          echo "=== Maven 版本 ==="
          mvn -version
      
      - name: Remove Oracle and SQL Server dependencies with Python
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          
          # 创建 Python 脚本来处理 pom.xml
          cat > fix_pom.py << 'PYTHON_SCRIPT'
          import xml.etree.ElementTree as ET
          import sys
          
          # 解析 pom.xml
          try:
              tree = ET.parse('pom.xml')
              root = tree.getroot()
              
              # 查找命名空间（Maven POM 通常没有命名空间）
              # 但有时会有 xmlns，我们需要处理
              ns = {'mvn': 'http://maven.apache.org/POM/4.0.0'}
              
              # 尝试获取 dependencies 节点（考虑命名空间）
              dependencies = None
              if root.tag.endswith('project'):
                  # 查找 dependencies 节点
                  for elem in root:
                      if elem.tag.endswith('dependencies'):
                          dependencies = elem
                          break
              
              if dependencies is None:
                  print("未找到 dependencies 节点")
                  sys.exit(1)
              
              # 收集需要删除的 dependency 节点
              to_remove = []
              for dep in dependencies:
                  groupId = None
                  artifactId = None
                  for child in dep:
                      if child.tag.endswith('groupId'):
                          groupId = child.text
                      elif child.tag.endswith('artifactId'):
                          artifactId = child.text
                  
                  # 检查是否是需要删除的依赖
                  if groupId and artifactId:
                      if ('oracle' in groupId.lower() or 
                          'oracle' in artifactId.lower() or
                          'ojdbc' in artifactId.lower() or
                          'microsoft' in groupId.lower() or
                          'sqljdbc' in artifactId.lower()):
                          to_remove.append(dep)
                          print(f"标记删除: {groupId}:{artifactId}")
                  
                  # 特殊处理：如果 groupId 为空但 artifactId 包含 sqljdbc
                  if not groupId and artifactId and 'sqljdbc' in artifactId.lower():
                      to_remove.append(dep)
                      print(f"标记删除 (空groupId): {artifactId}")
              
              # 删除标记的依赖
              for dep in to_remove:
                  dependencies.remove(dep)
                  print("已删除一个依赖")
              
              # 保存修改
              tree.write('pom.xml', encoding='UTF-8', xml_declaration=True)
              print("✅ pom.xml 已更新")
              
          except Exception as e:
              print(f"错误: {e}")
              sys.exit(1)
          PYTHON_SCRIPT
          
          # 显示原始 pom.xml 的依赖部分
          echo "=== 原始依赖 (前 50 行) ==="
          grep -A 2 -B 1 "<dependency>" pom.xml | head -50
          
          # 运行 Python 脚本
          python3 fix_pom.py
          
          # 显示修改后的依赖部分
          echo "=== 修改后依赖 (前 50 行) ==="
          grep -A 2 -B 1 "<dependency>" pom.xml | head -50
          
          # 验证是否还有残留
          echo "=== 检查残留 ==="
          grep -i "oracle\|ojdbc\|sqljdbc" pom.xml || echo "✅ 无残留"
      
      - name: Build WGCLOUD Server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          echo "开始编译 WGCLOUD Server..."
          mvn clean package -DskipTests
          echo "✅ 编译完成"
          echo "=== 编译产物 ==="
          ls -la target/
      
      - name: Find jar file
        id: jar
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server/target
          JAR_FILE=$(ls *.jar 2>/dev/null | grep -v original | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ 未找到编译后的 jar 文件"
            echo "target 目录内容:"
            ls -la
            exit 1
          fi
          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT
          echo "找到 jar 文件: ${JAR_FILE}"
      
      - name: Prepare Docker build context
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR_FILE="${{ steps.jar.outputs.jar_file }}"
          
          mkdir -p docker-build
          
          cp wgcloud-${VERSION}/wgcloud-server/target/${JAR_FILE} docker-build/wgcloud-server.jar
          
          if [ -d "wgcloud-${VERSION}/wgcloud-server/src/main/resources" ]; then
            cp -r wgcloud-${VERSION}/wgcloud-server/src/main/resources docker-build/config
          fi
          
          mkdir -p docker-build/logs docker-build/data
          
          echo "✅ 构建上下文已准备"
          ls -la docker-build/
      
      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          
          LABEL maintainer="wgcloud"
          LABEL description="WGCLOUD Monitoring Server for ARM64"
          
          WORKDIR /wgcloud-server
          
          COPY wgcloud-server.jar /wgcloud-server/
          COPY config /wgcloud-server/config/
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          ENV TZ=Asia/Shanghai
          RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
          
          EXPOSE 9997 9998 9999
          
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
          
          echo "✅ Dockerfile 已创建"
      
      - name: Build Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd docker-build
          docker build -t wgcloud-server:${VERSION} -t wgcloud-server:latest .
          docker images
      
      - name: Test container
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker run -d --name test-wgcloud -p 19999:9999 wgcloud-server:${VERSION}
          sleep 15
          echo "=== 测试容器日志 ==="
          docker logs test-wgcloud --tail 30
          docker stop test-wgcloud
          docker rm test-wgcloud || true
      
      - name: Save and compress
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker save wgcloud-server:${VERSION} | gzip > wgcloud-server-${VERSION}-arm64-compiled.tar.gz
          echo "✅ 构建完成"
          ls -lh *.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-${{ steps.version.outputs.version }}-arm64-compiled
          path: wgcloud-server-*.tar.gz
          retention-days: 30
