name: Build WGCLOUD ARM64 Image (Compiled)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号 (如 3.6.3)'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 构建版本: v${VERSION}"
      
      - name: Download WGCLOUD release source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
      
      - name: Install Maven and JDK 8
        run: |
          sudo apt-get update
          sudo apt-get install -y maven openjdk-8-jdk-headless xmlstarlet
          echo "=== Java 版本 ==="
          java -version
          echo "=== Maven 版本 ==="
          mvn -version
          echo "=== xmlstarlet 版本 ==="
          xmlstarlet --version
      
      - name: Remove Oracle and SQL Server dependencies
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          
          echo "=== 原始 pom.xml (依赖部分) ==="
          grep -A 5 -B 5 "oracle\|sqljdbc\|ojdbc" pom.xml || echo "未找到相关依赖"
          
          # 备份
          cp pom.xml pom.xml.bak
          
          # 使用 xmlstarlet 移除包含 oracle/sqljdbc/ojdbc 的 dependency 节点
          # 注意：xmlstarlet 对命名空间敏感，需要处理
          
          # 先移除 oracle 相关
          xmlstarlet ed -L -d "//dependencies/dependency[contains(groupId, 'oracle') or contains(artifactId, 'oracle') or contains(artifactId, 'ojdbc')]" pom.xml
          
          # 再移除 sqlserver 相关
          xmlstarlet ed -L -d "//dependencies/dependency[contains(groupId, 'microsoft') or contains(artifactId, 'sqljdbc')]" pom.xml
          
          echo "=== 修改后检查 ==="
          grep -i "oracle\|ojdbc\|sqljdbc" pom.xml || echo "✅ 依赖已成功移除"
          
          # 验证 XML 格式是否正确
          echo "=== 验证 XML 格式 ==="
          xmlstarlet val pom.xml && echo "✅ XML 格式正确" || echo "⚠️ XML 格式有问题"
      
      - name: Build WGCLOUD Server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          echo "开始编译 WGCLOUD Server..."
          mvn clean package -DskipTests
          echo "✅ 编译完成"
          echo "=== 编译产物 ==="
          ls -la target/
      
      - name: Find jar file
        id: jar
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server/target
          JAR_FILE=$(ls *.jar 2>/dev/null | grep -v original | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ 未找到编译后的 jar 文件"
            echo "target 目录内容:"
            ls -la
            exit 1
          fi
          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT
          echo "找到 jar 文件: ${JAR_FILE}"
          file ${JAR_FILE}
      
      - name: Prepare Docker build context
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR_FILE="${{ steps.jar.outputs.jar_file }}"
          
          mkdir -p docker-build
          
          # 复制编译后的 jar 文件
          cp wgcloud-${VERSION}/wgcloud-server/target/${JAR_FILE} docker-build/wgcloud-server.jar
          
          # 复制配置文件
          if [ -d "wgcloud-${VERSION}/wgcloud-server/src/main/resources" ]; then
            cp -r wgcloud-${VERSION}/wgcloud-server/src/main/resources docker-build/config
          fi
          
          # 创建目录
          mkdir -p docker-build/logs docker-build/data
          
          echo "✅ 构建上下文已准备"
          ls -la docker-build/
          file docker-build/wgcloud-server.jar
      
      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          
          LABEL maintainer="wgcloud"
          LABEL description="WGCLOUD Monitoring Server for ARM64"
          
          WORKDIR /wgcloud-server
          
          COPY wgcloud-server.jar /wgcloud-server/
          COPY config /wgcloud-server/config/
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          ENV TZ=Asia/Shanghai
          RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
          
          EXPOSE 9997 9998 9999
          
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
          
          echo "✅ Dockerfile 已创建"
      
      - name: Build Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd docker-build
          docker build -t wgcloud-server:${VERSION} -t wgcloud-server:latest .
          docker images
      
      - name: Test container
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker run -d --name test-wgcloud -p 19999:9999 wgcloud-server:${VERSION}
          echo "等待测试容器启动..."
          sleep 15
          echo "=== 测试容器日志 ==="
          docker logs test-wgcloud --tail 30
          docker stop test-wgcloud
          docker rm test-wgcloud
      
      - name: Save and compress
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker save wgcloud-server:${VERSION} | gzip > wgcloud-server-${VERSION}-arm64-compiled.tar.gz
          echo "✅ 构建完成"
          ls -lh *.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-${{ steps.version.outputs.version }}-arm64-compiled
          path: wgcloud-server-*.tar.gz
          retention-days: 30
