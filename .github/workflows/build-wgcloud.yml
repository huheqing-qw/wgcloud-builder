name: Build WGCLOUD ARM64 Image from Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号 (如 3.6.3，不带v前缀)'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 构建版本: v${VERSION}"
      
      - name: Download WGCLOUD release source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载并解压完成"
          echo "=== 根目录内容 ==="
          ls -la wgcloud-${VERSION}/
      
      - name: Prepare build context
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SOURCE_DIR="wgcloud-${VERSION}"
          
          # 创建构建目录
          mkdir -p docker-build
          
          # 正确路径：wgcloud-server 是子目录
          if [ -d "${SOURCE_DIR}/wgcloud-server" ]; then
            echo "✅ 找到 wgcloud-server 目录"
            echo "=== wgcloud-server 目录内容 ==="
            ls -la ${SOURCE_DIR}/wgcloud-server/
            echo "=============================="
            cp -r ${SOURCE_DIR}/wgcloud-server/* docker-build/
          else
            echo "❌ 未找到 wgcloud-server 目录"
            echo "当前目录结构:"
            ls -la ${SOURCE_DIR}/
            exit 1
          fi
          
          # 创建数据目录
          mkdir -p docker-build/data docker-build/logs
          
          echo "✅ 构建上下文已准备"
          echo "=== docker-build 目录内容 ==="
          ls -la docker-build/
      
      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          # WGCLOUD Server for ARM64
          FROM arm64v8/openjdk:8-jdk-slim
          
          LABEL maintainer="wgcloud"
          LABEL description="WGCLOUD Monitoring Server for ARM64"
          
          WORKDIR /wgcloud-server
          
          # 复制所有文件
          COPY . /wgcloud-server/
          
          # 查找并设置启动脚本权限
          RUN if [ -f "/wgcloud-server/start.sh" ]; then \
                chmod +x /wgcloud-server/start.sh; \
              elif [ -f "/wgcloud-server/bin/start.sh" ]; then \
                chmod +x /wgcloud-server/bin/start.sh; \
              elif [ -f "/wgcloud-server/wgcloud-server-start.sh" ]; then \
                chmod +x /wgcloud-server/wgcloud-server-start.sh; \
              else \
                echo "⚠️ 未找到启动脚本，将尝试直接运行 jar"; \
                ls -la /wgcloud-server/; \
              fi
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          EXPOSE 9997 9998 9999
          
          # 尝试多种启动方式
          CMD ["/bin/sh", "-c", "if [ -f /wgcloud-server/start.sh ]; then /wgcloud-server/start.sh; elif [ -f /wgcloud-server/bin/start.sh ]; then /wgcloud-server/bin/start.sh; elif [ -f /wgcloud-server/wgcloud-server-start.sh ]; then /wgcloud-server/wgcloud-server-start.sh; else echo '启动 jar...' && java -jar /wgcloud-server/*.jar; fi && sleep 87600h"]
          EOF
          
          echo "✅ Dockerfile 已创建"
          cat docker-build/Dockerfile
      
      - name: Build Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd docker-build
          docker build -t wgcloud-server:${VERSION} -t wgcloud-server:latest .
          docker images
      
      - name: Save and compress image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker save wgcloud-server:${VERSION} | gzip > wgcloud-server-${VERSION}-arm64.tar.gz
          echo "✅ 构建完成，产物列表:"
          ls -lh *.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-${{ steps.version.outputs.version }}-arm64
          path: wgcloud-server-*.tar.gz
          retention-days: 30
