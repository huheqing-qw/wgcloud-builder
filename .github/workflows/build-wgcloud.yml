name: Build WGCLOUD ARM64 Image (Original POM)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号 (如 3.6.3)'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 构建版本: v${VERSION}"
      
      - name: Download WGCLOUD release source
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
          echo "✅ 源码下载完成"
      
      - name: Install Maven and JDK 8
        run: |
          sudo apt-get update
          sudo apt-get install -y maven openjdk-8-jdk-headless
          echo "=== Java 版本 ==="
          java -version
          echo "=== Maven 版本 ==="
          mvn -version
      
      - name: Remove only Oracle and SQL Server dependencies from pom.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          
          # 备份原文件
          cp pom.xml pom.xml.original
          
          # 显示原始依赖
          echo "=== 原始 Oracle/SQL Server 依赖 ==="
          grep -n -B 5 -A 10 "ojdbc\|sqljdbc" pom.xml || echo "未找到"
          
          # 使用更精确的方法：找到并删除包含 ojdbc 或 sqljdbc 的整个 dependency 块
          # 使用 Python 确保精确删除
          python3 << 'PYTHON_SCRIPT'
import re

with open('pom.xml', 'r', encoding='utf-8') as f:
    content = f.read()

# 匹配 <dependency> 到 </dependency> 的块
pattern = r'<dependency>\s*<groupId>.*?</groupId>\s*<artifactId>.*?(?:ojdbc|sqljdbc).*?</artifactId>.*?</dependency>'
new_content = re.sub(pattern, '', content, flags=re.DOTALL)

# 同时匹配另一种格式
pattern2 = r'<dependency>\s*<groupId>com\.oracle</groupId>.*?</dependency>'
new_content = re.sub(pattern2, '', new_content, flags=re.DOTALL)

pattern3 = r'<dependency>\s*<groupId>com\.microsoft\.sqlserver</groupId>.*?</dependency>'
new_content = re.sub(pattern3, '', new_content, flags=re.DOTALL)

with open('pom.xml', 'w', encoding='utf-8') as f:
    f.write(new_content)

print("✅ 依赖删除完成")
PYTHON_SCRIPT
          
          # 验证
          echo "=== 删除后检查 ==="
          grep -i "ojdbc\|sqljdbc" pom.xml || echo "✅ 依赖已成功删除"
          
          # 显示修改后的文件大小
          wc -l pom.xml
      
      - name: Build WGCLOUD Server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server
          echo "开始编译 WGCLOUD Server..."
          mvn clean package -DskipTests
          echo "✅ 编译完成"
          echo "=== 编译产物 ==="
          ls -la target/
      
      - name: Find jar file
        id: jar
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd wgcloud-${VERSION}/wgcloud-server/target
          JAR_FILE=$(ls *.jar 2>/dev/null | grep -v original | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ 未找到编译后的 jar 文件"
            echo "target 目录内容:"
            ls -la
            exit 1
          fi
          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT
          echo "找到 jar 文件: ${JAR_FILE}"
      
      - name: Prepare Docker build context
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR_FILE="${{ steps.jar.outputs.jar_file }}"
          
          mkdir -p docker-build
          
          cp wgcloud-${VERSION}/wgcloud-server/target/${JAR_FILE} docker-build/wgcloud-server.jar
          
          if [ -d "wgcloud-${VERSION}/wgcloud-server/src/main/resources" ]; then
            cp -r wgcloud-${VERSION}/wgcloud-server/src/main/resources docker-build/config
          fi
          
          mkdir -p docker-build/logs docker-build/data
          
          echo "✅ 构建上下文已准备"
          ls -la docker-build/
      
      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          
          LABEL maintainer="wgcloud"
          LABEL description="WGCLOUD Monitoring Server for ARM64"
          
          WORKDIR /wgcloud-server
          
          COPY wgcloud-server.jar /wgcloud-server/
          COPY config /wgcloud-server/config/
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          ENV TZ=Asia/Shanghai
          RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
          
          EXPOSE 9997 9998 9999
          
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.jar", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
          
          echo "✅ Dockerfile 已创建"
      
      - name: Build Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd docker-build
          docker build -t wgcloud-server:${VERSION} -t wgcloud-server:latest .
          docker images
      
      - name: Test container
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker run -d --name test-wgcloud -p 19999:9999 wgcloud-server:${VERSION}
          sleep 15
          echo "=== 测试容器日志 ==="
          docker logs test-wgcloud --tail 30
          docker stop test-wgcloud
          docker rm test-wgcloud || true
      
      - name: Save and compress
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          docker save wgcloud-server:${VERSION} | gzip > wgcloud-server-${VERSION}-arm64-final.tar.gz
          echo "✅ 构建完成"
          ls -lh *.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-${{ steps.version.outputs.version }}-arm64-final
          path: wgcloud-server-*.tar.gz
          retention-days: 30
