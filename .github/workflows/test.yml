name: Build WGCLOUD ARM64 from WAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'WGCLOUD版本号'
        required: true
        default: '3.6.3'

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Download WGCLOUD WAR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # 尝试下载 war 包
          wget https://github.com/tianshiyeben/wgcloud/releases/download/v${VERSION}/wgcloud-server-release.war || \
          wget https://github.com/tianshiyeben/wgcloud/releases/download/v${VERSION}/wgcloud-server.war || \
          wget https://github.com/tianshiyeben/wgcloud/releases/download/v${VERSION}/wgcloud.war
          
          echo "下载的文件:"
          ls -la *.war 2>/dev/null || echo "未找到 war 文件"
      
      - name: Download source for config files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          wget https://github.com/tianshiyeben/wgcloud/archive/refs/tags/v${VERSION}.tar.gz
          tar -xzf v${VERSION}.tar.gz
      
      - name: Prepare Docker context
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p docker-build
          
          # 复制 war 包
          if [ -f wgcloud-server-release.war ]; then
            cp wgcloud-server-release.war docker-build/wgcloud-server.war
          elif [ -f wgcloud-server.war ]; then
            cp wgcloud-server.war docker-build/wgcloud-server.war
          elif [ -f wgcloud.war ]; then
            cp wgcloud.war docker-build/wgcloud-server.war
          else
            echo "❌ 未找到 war 文件"
            exit 1
          fi
          
          # 复制配置文件
          if [ -d "wgcloud-${VERSION}/wgcloud-server/src/main/resources" ]; then
            cp -r wgcloud-${VERSION}/wgcloud-server/src/main/resources docker-build/config
          fi
          
          mkdir -p docker-build/logs docker-build/data
      
      - name: Create Dockerfile
        run: |
          cat > docker-build/Dockerfile << 'EOF'
          FROM arm64v8/openjdk:8-jdk-slim
          
          WORKDIR /wgcloud-server
          
          # 复制 war 包
          COPY wgcloud-server.war /wgcloud-server/
          
          # 复制配置文件
          COPY config /wgcloud-server/config/
          
          RUN mkdir -p /wgcloud-server/logs /wgcloud-server/data
          
          ENV TZ=Asia/Shanghai
          RUN ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone
          
          EXPOSE 9997 9998 9999
          
          # 使用内置 Tomcat 运行 war
          CMD ["java", "-jar", "/wgcloud-server/wgcloud-server.war", "--spring.config.location=/wgcloud-server/config/application.yml"]
          EOF
      
      - name: Build image
        run: |
          cd docker-build
          docker build -t wgcloud-server:latest .
          docker images
      
      - name: Save and upload
        run: |
          docker save wgcloud-server:latest | gzip > wgcloud-server-arm64-war.tar.gz
          ls -lh *.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgcloud-server-arm64-war
          path: wgcloud-server-arm64-war.tar.gz
